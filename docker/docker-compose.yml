version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: nest-postgres
    environment:
      POSTGRES_DB: nest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nest-network

  redis:
    image: redis:7-alpine
    container_name: nest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nest-network

  api:
    build:
      context: ../apps/api
      dockerfile: ../../docker/Dockerfile.api
    container_name: nest-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/nest"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: "development"
      PORT: "3001"
      FRONTEND_URL: "http://localhost:3000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/api:/app
      - /app/node_modules
    networks:
      - nest-network

  web:
    build:
      context: ../apps/web
      dockerfile: ../../docker/Dockerfile.web
    container_name: nest-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    depends_on:
      - api
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    networks:
      - nest-network

volumes:
  postgres_data:
  redis_data:

networks:
  nest-network:
    driver: bridge
